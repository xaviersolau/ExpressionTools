name: Dotnet Build Template

on:
  workflow_call:
    inputs:
      dotnet-version:
        required: false
        type: string
        default: "10.0.x"

      test-projects:
        required: true
        type: string

      run-pack:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --configuration Release --no-build --no-restore

  coverage:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        test_path: ${{ fromJson(inputs.test-projects) }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

    - name: Restore
      run: dotnet restore ${{ matrix.test_path }}

    - name: Build
      run: |
        dotnet build ${{ matrix.test_path }} \
          --configuration Release \
          --no-restore

    - name: Run coverage
      run: |
        dotnet test ${{ matrix.test_path }} \
          --configuration Release \
          --no-build \
          --no-restore \
          --collect:"XPlat Code Coverage" \
          --settings coverlet.runsettings

    - name: Normalize coverage
      run: |
        mv ${{ matrix.test_path }}/TestResults/**/coverage.cobertura.xml \
           ${{ matrix.test_path }}/TestResults/coverage.cobertura.xml

        sed -i '/filename="/ s|filename="${{ github.workspace }}/src/|filename="src/|g' \
          ${{ matrix.test_path }}/TestResults/coverage.cobertura.xml

    - name: Artifact name
      id: sanitize
      run: |
        SAFE_NAME=$(echo "${{ matrix.test_path }}" | sed 's#[/:<>|*?"\\\r\n]#-#g')
        echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ steps.sanitize.outputs.safe_name }}
        path: ${{ matrix.test_path }}/TestResults/coverage.cobertura.xml

  merge-coverage:
    needs: coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        path: coverage

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Merge
      run: |
        reportgenerator \
          -reports:"coverage/**/coverage.cobertura.xml" \
          -targetdir:"coverage-report" \
          -reporttypes:"Cobertura"

    - name: Send to Coveralls
      uses: coverallsapp/github-action@v2.2.3
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: coverage-report/Cobertura.xml
        format: cobertura
        base-path: /

  pack:
    if: ${{ inputs.run-pack }}
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

    - run: dotnet restore
    - run: dotnet build --configuration Release --no-restore
    - run: dotnet pack --configuration Release --no-build --no-restore

    - uses: actions/upload-artifact@v4
      with:
        name: NugetPackages
        path: src/libs/**/*.nupkg
